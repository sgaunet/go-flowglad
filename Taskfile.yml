# https://taskfile.dev
version: '3'
includes:
  dev: ./Taskfile_dev.yml

tasks:
  default:
    desc: "List tasks"
    preconditions:
      - sh: test -f .git/hooks/pre-commit
        msg: "Pre-commit hook is not set up. Please run 'task pre-commit-setup' first."
    cmds:
      - task -a

  check-before-commit:
    desc: "Run checks before committing"
    preconditions:
      - sh: test -f .git/hooks/pre-commit
        msg: "Pre-commit hook is not set up. Please run 'task pre-commit-setup' first."
    deps:
      - test
    cmds:
      - task: lint

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run

  test:
    desc: "Run unit tests with race detection"
    cmds:
      - go test -count=2 -race ./...

  doc:
    desc: "Start godoc documentation server"
    cmds:
      - echo http://localhost:6060
      - godoc -http=:6060
